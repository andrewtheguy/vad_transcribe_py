name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.1). Leave empty to auto-bump patch."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Determine version
        id: version
        run: |
          current=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.version }}" ]; then
            echo "new=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r major minor patch <<< "$current"
            echo "new=${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.new }}\"/" pyproject.toml

      - name: Update lock file
        run: uv lock

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "Version already up to date, skipping commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          fi
          git tag "${{ steps.version.outputs.new }}"
          git push origin main --tags

      - name: Build wheel
        run: uv build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.new }}" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz

  deploy-pages:
    needs: release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate PEP 503 package index
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p "_pages/simple/vad-transcribe-py"
          {
            echo '<!DOCTYPE html><html><body>'
            gh release list --limit 100 --exclude-drafts --json tagName --jq '.[].tagName' | while read -r tag; do
              gh release view "$tag" --json assets --jq '.assets[] | select(.name | endswith(".whl") or endswith(".tar.gz")) | .name' | while read -r name; do
                echo "<a href=\"https://github.com/${GH_REPO}/releases/download/${tag}/${name}\">${name}</a><br>"
              done
            done
            echo '</body></html>'
          } > "_pages/simple/vad-transcribe-py/index.html"

          cat > _pages/simple/index.html <<'HTML'
          <!DOCTYPE html><html><body>
          <a href="vad-transcribe-py/">vad-transcribe-py</a>
          </body></html>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_pages'
      - id: deployment
        uses: actions/deploy-pages@v4
