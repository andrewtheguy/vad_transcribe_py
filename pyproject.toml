[project]
name = "whisper-transcribe-py"
version = "0.1.0"
description = ""
authors = [{ name = "Andrew Chen", email = "andrew@jaanuu.com" }]
requires-python = "~=3.12.0"
readme = "README.md"
dependencies = [
    "silero-vad>=5.1.2,<6",
    "argparse>=1.4.0,<2",
    "soundfile>=0.12.1,<0.13",
    "sounddevice>=0.5.1,<0.6",
    "scipy>=1.14.1,<2",
    "readchar>=4.2.1,<5",
    "psycopg[binary]>=3.2.3,<4",
    "python-dotenv>=1.0.1,<2",
    "torch>=2.5.1,<3",
    "numpy>=2.2.1,<3",
    "zhconv-rs>=0.3.2.post2,<0.4",
    "pywhispercpp",
    "fastapi>=0.115.0,<1",
    "uvicorn[standard]>=0.32.0,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0,<10",
    "httpx>=0.28.1,<1",
]

[tool.uv]

[tool.uv.sources]
pywhispercpp = { git = "https://github.com/absadiki/pywhispercpp", tag = "v1.3.3" }

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]
filterwarnings = [
    # Ignore deprecation warnings from third-party libraries
    "ignore::DeprecationWarning:silero_vad.*",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
